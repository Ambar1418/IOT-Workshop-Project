<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SISTec IoT Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-xl shadow p-6">
      <h1 class="text-2xl font-bold text-slate-900">Register</h1>
      <p class="text-slate-600 mt-1">Create your dashboard account</p>

      <form id="registerForm" class="mt-6 space-y-4" method="POST" action="/register">
        <div>
          <label class="block text-sm font-medium text-slate-700">Name</label>
          <input id="name" name="name" type="text" class="mt-1 w-full border rounded px-3 py-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            class="mt-1 w-full border rounded px-3 py-2"
            required
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="mt-1 w-full border rounded px-3 py-2"
            required
            minlength="3"
          />
        </div>
        <button class="w-full bg-green-700 text-white rounded py-2 font-semibold" type="submit">Register</button>
      </form>

      <div class="mt-4 text-sm text-slate-700">
        Already registered?
        <a class="text-blue-700 font-semibold" href="/">Login</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("registerForm");
      form.addEventListener("submit", (e) => {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!name || !email || !password) {
          e.preventDefault();
          alert("Please fill all fields.");
        }
      });
    </script>
  </body>
</html>
