<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SISTec IoT Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-xl shadow p-6">
      <h1 class="text-2xl font-bold text-slate-900">Login</h1>
      <p class="text-slate-600 mt-1">SISTec IoT Application 2026</p>

      <form id="loginForm" class="mt-6 space-y-4" method="POST" action="/login">
        <div>
          <label class="block text-sm font-medium text-slate-700">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            class="mt-1 w-full border rounded px-3 py-2"
            placeholder="name@example.com"
            required
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="mt-1 w-full border rounded px-3 py-2"
            placeholder="Enter password"
            required
            minlength="3"
          />
        </div>
        <button class="w-full bg-blue-700 text-white rounded py-2 font-semibold" type="submit">Login</button>
      </form>

      <div class="mt-4 text-sm text-slate-700">
        New user?
        <a class="text-blue-700 font-semibold" href="/register">Register</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      form.addEventListener("submit", (e) => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!email || !password) {
          e.preventDefault();
          alert("Please enter email and password.");
        }
      });
    </script>
  </body>
</html>
